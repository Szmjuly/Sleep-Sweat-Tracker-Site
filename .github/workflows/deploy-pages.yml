name: Deploy Site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Write Firebase config
        shell: bash
        env:
          FIREBASE_CONFIG_JSON: ${{ secrets.FIREBASE_CONFIG_JSON }}
        run: |
          if [ -z "$FIREBASE_CONFIG_JSON" ]; then
            echo "::error::FIREBASE_CONFIG_JSON is required for mobile sign-in and sync."
            exit 1
          fi
          printf '%s' "$FIREBASE_CONFIG_JSON" > firebase-config.default.json
          python3 -c "import json, pathlib, sys; data=json.loads(pathlib.Path('firebase-config.default.json').read_text()); missing=[k for k in ('apiKey','projectId','appId') if not data.get(k)]; sys.exit('FIREBASE_CONFIG_JSON is missing: '+', '.join(missing) if missing else 0)"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
